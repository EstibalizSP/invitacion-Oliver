<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="theme-color" content="#0b4dd6" />
<title>Invitación – Oliver 3 años</title>

<style>
:root{
  --maxw: 480px;
  --blue: #0b4dd6;
  --red: #ff3b30;
  --yellow: #ffcc00;
  --glass: rgba(0,0,0,.35);
}

body{
  margin:0;
  font-family:'Segoe UI', system-ui, sans-serif;
  max-width:var(--maxw);
  margin:0 auto;
  color:white;
  background:url("fondo1.jpg") no-repeat center top / cover;
  overflow-x:hidden;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  max-width:var(--maxw);
  margin:0 auto;
  background:linear-gradient(to bottom, rgba(0,0,0,.25), rgba(0,0,0,.75));
  pointer-events:none;
}

.page{
  position:relative;
  padding:18px 16px 120px;
  text-align:center;
}

.badge{
  display:inline-block;
  padding:10px 16px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.5);
  backdrop-filter: blur(8px);
  font-weight:900;
  margin-bottom:10px;
}

.title{
  margin:.35rem 0;
  font-weight:1000;
  letter-spacing:.6px;
  line-height:1.05;
  -webkit-text-stroke:2px rgba(0,0,0,.35);
  text-shadow:0 4px 12px rgba(0,0,0,.9);
}

h2.title{ font-size: clamp(20px, 6.5vw, 28px); }
h1.title{ font-size: clamp(42px, 11vw, 64px); }

.blink{
  animation: blinkFade 2.5s ease-in-out infinite;
}
@keyframes blinkFade{
  0%,20%{opacity:1}
  40%{opacity:.2}
  60%{opacity:1}
}

.photo-wrap{
  width:200px;
  height:200px;
  margin:14px auto 8px;
  border-radius:50%;
  overflow:hidden;
  cursor:pointer;
  border:6px solid white;
  box-shadow:0 12px 26px rgba(0,0,0,.6);
}
.photo-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.tap-hint{
  margin-top:8px;
  padding:10px 18px;
  border-radius:999px;
  border:2px solid white;
  font-weight:900;
  background:linear-gradient(135deg, var(--red), var(--blue));
  color:white;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,.5);
}

.glass{
  margin:18px auto 0;
  padding:16px 14px;
  border-radius:18px;
  background:var(--glass);
  backdrop-filter: blur(10px);
  box-shadow:0 8px 20px rgba(0,0,0,.5);
  font-weight:900;
}

.count-line{
  font-size: clamp(20px, 6vw, 28px);
  font-weight:1000;
}

.cta{
  display:block;
  margin:14px auto 0;
  padding:14px;
  width:90%;
  border-radius:16px;
  font-weight:1000;
  text-decoration:none;
  font-size: clamp(16px, 4.8vw, 22px);
  color:white;
  border:1px solid rgba(255,255,255,.5);
  box-shadow:0 6px 18px rgba(0,0,0,.5);
  background:linear-gradient(135deg, var(--yellow), var(--blue));
}

.hug{
  margin-top:18px;
  font-size:22px;
  font-weight:1000;
}

.emoji-layer{
  position:fixed;
  inset:0;
  max-width:var(--maxw);
  margin:0 auto;
  pointer-events:none;
  overflow:hidden;
}

.emoji{
  position:absolute;
  top:-120px;
  font-size:28px;
  animation: fallDown linear forwards;
}

@keyframes fallDown{
  to{ transform:translateY(105vh) rotate(220deg); opacity:0; }
}

.big{
  font-size:70px;
  margin-top:6px;
  animation: pulse 1.2s infinite;
}
@keyframes pulse{
  0%{transform:scale(.9)}
  50%{transform:scale(1.1)}
  100%{transform:scale(.9)}
}
</style>
</head>

<body>
<div class="page">

<div class="badge">🐾 Misión: Cumpleaños 🚨</div>

<h2 class="title">¡Te invito a mi fiesta!</h2>
<h1 class="title blink">OLIVER CUMPLE 3 AÑOS</h1>

<div class="photo-wrap" id="photo">
  <img src="OLIVER.jpg.jpeg" alt="Foto de Oliver">
</div>

<button class="tap-hint" id="tapHint">👉 ¡Pincha aquí para activar la misión! 🎉</button>

<div class="glass">
📅 22 de marzo de 2026<br>
🕔 17:00 h<br>
📍 Parque de bolas <b>Bola Loca</b><br>
Bollullos de la Mitación
</div>

<div class="glass">
<div id="countdown" class="count-line">⏳ Faltan …</div>
🥳 ¡Habrá juegos, risas y merienda! 🎂
</div>

<a class="cta" target="_blank"
href="https://www.google.com/maps/search/?api=1&query=Parque%20de%20bolas%20Bola%20Loca%20Bollullos%20de%20la%20Mitaci%C3%B3n">
📍 Abrir ubicación
</a>

<a class="cta" target="_blank"
href="https://wa.me/34675311350?text=%C2%A1Hola!%20Confirmo%20asistencia%20al%20cumple%20de%20Oliver%20🎉">
💬 Confirmar asistencia
</a>

<div class="hug">¡Te esperamos! 🐾</div>
<div class="big">🎈</div>

</div>

<div class="emoji-layer" id="emojiLayer"></div>

<audio id="voice">
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<script>
const CONFIG = {
  targetISO: "2026-03-22T17:00:00",
  EMOJIS: ["🎉","🎊","🎂","🎈","🎁","🥳","🐾","🦴"],
  burstCount: 80
};

const countdownEl = document.getElementById("countdown");
const targetDate = new Date(CONFIG.targetISO);

function updateCountdown(){
  const now = new Date();
  const diff = targetDate - now;
  if(diff <= 0){
    countdownEl.textContent = "🎉 ¡Ya empezó la fiesta! 🎉";
    clearInterval(timer);
    return;
  }
  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff/(1000*60*60))%24);
  const m = Math.floor((diff/(1000*60))%60);
  const s = Math.floor((diff/1000)%60);
  countdownEl.textContent = `⏳ Faltan ${d}d ${h}h ${m}m ${s}s`;
}
const timer=setInterval(updateCountdown,1000);
updateCountdown();

const layer = document.getElementById('emojiLayer');
const photo = document.getElementById('photo');
const tapHint = document.getElementById('tapHint');
const audio = document.getElementById('voice');

function triggerMagic(){
  rainEmojis(CONFIG.burstCount);
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

photo.addEventListener('click', triggerMagic);
tapHint.addEventListener('click', triggerMagic);

function rainEmojis(count){
  const w = document.body.clientWidth;
  for(let i=0;i<count;i++){
    const span = document.createElement('span');
    span.className='emoji';
    span.textContent = CONFIG.EMOJIS[Math.floor(Math.random()*CONFIG.EMOJIS.length)];
    span.style.left = Math.random()*w + 'px';
    span.style.animationDuration = (5 + Math.random()*4) + 's';
    layer.appendChild(span);
    span.addEventListener('animationend', ()=> span.remove());
  }
}
</script>
</body>
</html>
